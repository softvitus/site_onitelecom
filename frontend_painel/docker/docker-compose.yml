# ================================
# Docker Compose - Frontend Painel React (Vite)
# ================================
# Uso:
# - Development: npm run dev (localhost:5173)
# - Docker Build: docker-compose up --build
# - Production: docker-compose -f docker-compose.yml up
#
# As variáveis de ambiente vêm do .env.production
# ================================

services:
  # Frontend Painel React (Vite) - Production (served by Nginx)
  frontend-painel:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      # Variáveis de ambiente vêm do .env.production
    container_name: site-oni-frontend-painel
    ports:
      - "${FRONTEND_PAINEL_PORT:-3001}:80"
    networks:
      - site-oni-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: ${FRONTEND_PAINEL_HEALTH_INTERVAL:-30s}
      timeout: ${FRONTEND_PAINEL_HEALTH_TIMEOUT:-10s}
      retries: ${FRONTEND_PAINEL_HEALTH_RETRIES:-3}
      start_period: ${FRONTEND_PAINEL_HEALTH_START:-10s}
    restart: ${FRONTEND_PAINEL_RESTART:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${FRONTEND_PAINEL_CPUS_LIMIT:-1}
          memory: ${FRONTEND_PAINEL_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${FRONTEND_PAINEL_CPUS_RESERVE:-0.25}
          memory: ${FRONTEND_PAINEL_MEMORY_RESERVE:-128M}

networks:
  site-oni-network:
    driver: bridge
