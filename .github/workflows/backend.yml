name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  DB_USER: postgres
  DB_PASSWORD: postgres
  JWT_SECRET: test-secret-key

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: site_oni_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          PORT: 5001
          DB_NAME: site_oni_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DIALECT: postgres
          JWT_SECRET: test-secret-key
          API_URL: http://localhost:5001
          LOG_LEVEL: error
        run: npm test -- --coverage || true

      - name: Upload coverage reports
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: unittests
          name: codecov-backend
        continue-on-error: true

  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Audit npm packages
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

  build:
    name: Build & Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci --legacy-peer-deps

      - name: Validate build
        working-directory: ./backend
        run: node -c server.js || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t site-oni-backend:${{ github.sha }} \
                       -t site-oni-backend:latest \
                       -f docker/Dockerfile .

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker tag site-oni-backend:latest ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:latest
          docker tag site-oni-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:${{ github.sha }}
        continue-on-error: true
