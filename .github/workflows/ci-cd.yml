name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  DB_USER: postgres
  DB_PASSWORD: postgres
  JWT_SECRET: test-secret-key
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────
  # BACKEND - Lint, Test, Security, Build
  # ─────────────────────────────────────────────────────────────

  backend-lint:
    name: Backend - Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint || true

  backend-test:
    name: Backend - Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: site_oni_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          PORT: 5001
          DB_NAME: site_oni_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DIALECT: postgres
          JWT_SECRET: test-secret-key
          API_URL: http://localhost:5001
          LOG_LEVEL: error
        run: npm test -- --coverage || true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage
        continue-on-error: true

  backend-security:
    name: Backend - Security Checks
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Audit npm packages
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

  backend-build:
    name: Backend - Build & Docker
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Validate build
        working-directory: ./backend
        run: node -c server.js || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t site-oni-backend:${{ github.sha }} \
                       -t site-oni-backend:latest \
                       -f docker/Dockerfile .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "Docker Hub credentials not configured. Skipping push."
            exit 0
          fi
          
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag site-oni-backend:latest ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:latest
          docker tag site-oni-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:${{ github.sha }}
          docker logout
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # FRONTEND - Lint, Test, Build
  # ─────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  frontend-test:
    name: Frontend - Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # FRONTEND PAINEL - Lint, Build
  # ─────────────────────────────────────────────────────────────

  painel-lint:
    name: Frontend Painel - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend_painel/package-lock.json

      - name: Install dependencies
        working-directory: frontend_painel
        run: npm ci

      - name: Run ESLint
        working-directory: frontend_painel
        run: npm run lint

  painel-build:
    name: Frontend Painel - Build
    runs-on: ubuntu-latest
    needs: painel-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend_painel/package-lock.json

      - name: Install dependencies
        working-directory: frontend_painel
        run: npm ci

      - name: Run build
        working-directory: frontend_painel
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-painel-build
          path: frontend_painel/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # FINAL STATUS
  # ─────────────────────────────────────────────────────────────

  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - backend-security
      - backend-build
      - frontend-lint
      - frontend-test
      - frontend-build
      - painel-lint
      - painel-build
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ needs.backend-lint.result }}" = "failure" ] || \
             [ "${{ needs.backend-test.result }}" = "failure" ] || \
             [ "${{ needs.backend-security.result }}" = "failure" ] || \
             [ "${{ needs.frontend-lint.result }}" = "failure" ] || \
             [ "${{ needs.frontend-test.result }}" = "failure" ] || \
             [ "${{ needs.painel-lint.result }}" = "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          fi
          echo "✅ Pipeline passed"
