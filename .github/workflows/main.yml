name: Build, Test & Security

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Security scan diariamente às 2 AM UTC (22 PM BRT)
    - cron: '0 2 * * *'

env:
  DB_USER: postgres
  DB_PASSWORD: postgres
  JWT_SECRET: test-secret-key
  NODE_VERSION: '20'

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # BACKEND - Lint, Test, Security, Build
  # ─────────────────────────────────────────────────────────────

  backend-lint:
    name: Backend - Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint || true

  backend-test:
    name: Backend - Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: site_oni_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          PORT: 5001
          DB_NAME: site_oni_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DIALECT: postgres
          JWT_SECRET: test-secret-key
          API_URL: http://localhost:5001
          LOG_LEVEL: error
        run: npm test -- --coverage || true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend
          name: backend-coverage
        continue-on-error: true

  backend-security:
    name: Backend - Security Checks
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Audit npm packages
        working-directory: ./backend
        run: npm audit --audit-level=moderate || true

  backend-build:
    name: Backend - Build & Docker
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, backend-security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Validate build
        working-directory: ./backend
        run: node -c server.js || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./backend
        run: |
          docker build -t site-oni-backend:${{ github.sha }} \
                       -t site-oni-backend:latest \
                       -f docker/Dockerfile .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "Docker Hub credentials not configured. Skipping push."
            exit 0
          fi

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag site-oni-backend:latest ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:latest
          docker tag site-oni-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/site-oni-backend:${{ github.sha }}
          docker logout
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # FRONTEND - Lint, Test, Build
  # ─────────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  frontend-test:
    name: Frontend - Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run build
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # FRONTEND PAINEL - Lint, Build
  # ─────────────────────────────────────────────────────────────

  painel-lint:
    name: Frontend Painel - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend_painel/package-lock.json

      - name: Install dependencies
        working-directory: frontend_painel
        run: npm ci

      - name: Run ESLint
        working-directory: frontend_painel
        run: npm run lint

  painel-build:
    name: Frontend Painel - Build
    runs-on: ubuntu-latest
    needs: painel-lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend_painel/package-lock.json

      - name: Install dependencies
        working-directory: frontend_painel
        run: npm ci

      - name: Run build
        working-directory: frontend_painel
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-painel-build
          path: frontend_painel/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # DEPENDENCY SCANNING
  # ─────────────────────────────────────────────────────────────

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend, frontend_painel]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        working-directory: ${{ matrix.project }}
        run: npm audit --audit-level=moderate || exit 0
        continue-on-error: true

      - name: Generate advisory report
        working-directory: ${{ matrix.project }}
        run: npm audit --json > audit-report.json || exit 0
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-${{ matrix.project }}
          path: ${{ matrix.project }}/audit-report.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # CODE SCANNING WITH CODEQL
  # ─────────────────────────────────────────────────────────────

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --workspaces || exit 0
          npm ci --workspace=backend || exit 0
          npm ci --workspace=frontend || exit 0
          npm ci --workspace=frontend_painel || exit 0

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # SAST - TRIVY SCANNER
  # ─────────────────────────────────────────────────────────────

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          skip-dirs: 'node_modules,dist,build,coverage'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # SECRET SCANNING
  # ─────────────────────────────────────────────────────────────

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # OWASP DEPENDENCY CHECK
  # ─────────────────────────────────────────────────────────────

  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Site ONI'
          path: '.'
          format: 'SARIF'
          args: >
            --enableExperimental
            --scan ./backend
            --scan ./frontend
            --scan ./frontend_painel
        continue-on-error: true

      - name: Upload dependency check results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'reports/dependency-check-report.sarif'
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # FINAL STATUS
  # ─────────────────────────────────────────────────────────────

  status:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - backend-security
      - backend-build
      - frontend-lint
      - frontend-test
      - frontend-build
      - painel-lint
      - painel-build
      - dependency-check
      - codeql
      - trivy-scan
      - secret-scan
      - owasp-dependency-check
    if: always()
    steps:
      - name: Check pipeline status
        run: |
          if [ "${{ needs.backend-lint.result }}" = "failure" ] || \
             [ "${{ needs.backend-test.result }}" = "failure" ] || \
             [ "${{ needs.backend-security.result }}" = "failure" ] || \
             [ "${{ needs.frontend-lint.result }}" = "failure" ] || \
             [ "${{ needs.frontend-test.result }}" = "failure" ] || \
             [ "${{ needs.painel-lint.result }}" = "failure" ]; then
            echo "❌ Pipeline failed"
            exit 1
          fi
          echo "✅ Pipeline passed"

      - name: Create unified report
        if: always()
        run: |
          echo "# 🔒 Build & Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Lint: ${{ needs.backend-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Test: ${{ needs.backend-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Build: ${{ needs.backend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Lint: ${{ needs.frontend-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Test: ${{ needs.frontend-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend Build: ${{ needs.frontend-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Painel Lint: ${{ needs.painel-lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Painel Build: ${{ needs.painel-build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Scan: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CodeQL Analysis: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trivy Scan: ${{ needs.trivy-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Secret Scan: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- OWASP Check: ${{ needs.owasp-dependency-check.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Build & Security Pipeline Completed**\n\nSee results in the workflow run or in the [Security tab](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/security)'
            })
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # DEPLOYMENT TO PRODUCTION
  # ─────────────────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    needs: status
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            echo "🚀 Starting deployment..."

            cd /app/site-oni

            # Update repository
            echo "🧹 Updating repository..."
            git config --global --add safe.directory /app/site-oni
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e '.env*' -e 'data/' -e 'logs/' -e 'backups/'
            echo "✅ Repository updated"

            # Create necessary directories
            mkdir -p data logs backups

            # Verify environment files exist in each project
            if [ ! -f "backend/.env.production" ]; then
              echo "⚠️  backend/.env.production not found!"
              exit 1
            fi
            if [ ! -f "frontend/.env.production" ]; then
              echo "⚠️  frontend/.env.production not found!"
              exit 1
            fi
            if [ ! -f "frontend_painel/.env.production" ]; then
              echo "⚠️  frontend_painel/.env.production not found!"
              exit 1
            fi
            echo "✅ All .env.production files found"

            # Build Docker images without cache
            echo "🔨 Building Docker images..."
            docker compose build --no-cache

            # Start containers
            echo "🔄 Starting containers..."
            docker compose -f docker-compose.yml up -d

            # Wait for services to be healthy
            echo "⏳ Waiting for services to be healthy..."
            sleep 10

            # Check backend health
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "✅ Backend is healthy"
            else
              echo "❌ Backend health check failed"
              exit 1
            fi

            # Run database migrations (if needed)
            echo "🗄️  Running migrations..."
            docker compose exec -T backend npm run migrate:prod || true

            # Run database seeds (if needed)
            echo "🌱 Running seeds..."
            docker compose exec -T backend npm run seed:prod || true

            echo "✅ Deployment completed successfully!"

      - name: Verify Deployment
        if: always()
        run: |
          echo "Deployment Status: ${{ job.status }}"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Application deployed successfully"
            echo "🌐 Access at: https://${{ secrets.DEPLOY_HOST }}"
          else
            echo "❌ Deployment failed"
            exit 1
          fi

      - name: Setup Nginx + SSL (optional)
        if: success()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            echo "🔧 Setting up Nginx + SSL..."

            # Check if already configured (avoid re-running every time)
            if [ -f "/etc/nginx/sites-available/site-oni" ]; then
              echo "✅ Nginx already configured, skipping setup"
              exit 0
            fi

            # Download and run setup script as root using su
            su root -c 'bash -c "curl -fsSL https://raw.githubusercontent.com/softvitus/site_onitelecom/main/scripts/setup-nginx-ssl.sh | bash"'

            echo "✅ Nginx + SSL setup completed"
        continue-on-error: true

      - name: Notify Slack (optional)
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 Deployment Status: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Deployment to Production*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true
