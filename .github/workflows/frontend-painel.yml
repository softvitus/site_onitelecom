name: Frontend Painel CI/CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend_painel/**'
      - '.github/workflows/frontend-painel.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend_painel/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_painel/package-lock.json

      - name: Install dependencies
        working-directory: frontend_painel
        run: npm ci

      - name: Run ESLint
        working-directory: frontend_painel
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend_painel/package-lock.json

      - name: Install dependencies
        working-directory: frontend_painel
        run: npm ci

      - name: Run build
        working-directory: frontend_painel
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-painel-build
          path: frontend_painel/dist/
          retention-days: 7
