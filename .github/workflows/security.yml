name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Rodar diariamente às 2 AM UTC (22 PM BRT)
    - cron: '0 2 * * *'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Dependency Scanning
  # ─────────────────────────────────────────────────────────────

  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend, frontend_painel]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        working-directory: ${{ matrix.project }}
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Generate advisory report
        working-directory: ${{ matrix.project }}
        run: npm audit --json > audit-report.json
        continue-on-error: true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ matrix.project }}
          path: ${{ matrix.project }}/audit-report.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Code Scanning with CodeQL
  # ─────────────────────────────────────────────────────────────

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --workspaces
          npm ci --workspace=backend
          npm ci --workspace=frontend
          npm ci --workspace=frontend_painel
        continue-on-error: true

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ─────────────────────────────────────────────────────────────
  # SAST - Trivy Scanner
  # ─────────────────────────────────────────────────────────────

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          skip-dirs: 'node_modules,dist,build,coverage'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  # ─────────────────────────────────────────────────────────────
  # Secret Scanning
  # ─────────────────────────────────────────────────────────────

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # OWASP Dependency Check
  # ─────────────────────────────────────────────────────────────

  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Site ONI'
          path: '.'
          format: 'SARIF'
          args: >
            --enableExperimental
            --skip-remote-validation
            --scan ./backend
            --scan ./frontend
            --scan ./frontend_painel

      - name: Upload dependency check results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'reports/dependency-check-report.sarif'
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Security Report
  # ─────────────────────────────────────────────────────────────

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    if: always()
    needs: [dependency-check, codeql, trivy-scan, secret-scan, owasp-dependency-check]
    steps:
      - uses: actions/checkout@v4

      - name: Create security report
        run: |
          echo "# 🔒 Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependency Check: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ OWASP Dependency Check: ${{ needs.owasp-dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CodeQL Analysis: ${{ needs.codeql.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Trivy Scan: ${{ needs.trivy-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Secret Scanning: ${{ needs.secret-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Actions" >> $GITHUB_STEP_SUMMARY
          echo "👉 Review results in [Security tab](https://github.com/softvitus/site_onitelecom/security)" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔒 **Security Scan Completed**\n\nSee results in the [Security tab](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/security)'
            })
