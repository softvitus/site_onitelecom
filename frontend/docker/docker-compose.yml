# ================================
# Docker Compose - Frontend React
# ================================
# Uso:
# - Development: npm start (localhost:3000)
# - Docker Build: docker-compose up --build
# - Production: docker-compose -f docker-compose.yml up
#
# As variáveis de ambiente vêm do .env.production
# ================================

services:
  # Frontend React - Production (served by Nginx)
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      # Variáveis de ambiente vêm do .env.production
    container_name: site-oni-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - site-oni-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: ${FRONTEND_HEALTH_INTERVAL:-30s}
      timeout: ${FRONTEND_HEALTH_TIMEOUT:-10s}
      retries: ${FRONTEND_HEALTH_RETRIES:-3}
      start_period: ${FRONTEND_HEALTH_START:-10s}
    restart: ${FRONTEND_RESTART:-unless-stopped}
    deploy:
      resources:
        limits:
          cpus: ${FRONTEND_CPUS_LIMIT:-1}
          memory: ${FRONTEND_MEMORY_LIMIT:-512M}
        reservations:
          cpus: ${FRONTEND_CPUS_RESERVE:-0.25}
          memory: ${FRONTEND_MEMORY_RESERVE:-128M}

networks:
  site-oni-network:
    driver: bridge
