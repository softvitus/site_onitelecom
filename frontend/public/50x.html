<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Erro do Servidor</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --muted: #737373;
            --accent: #1a1a1a;
            --border: #e5e5e5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .error {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 420px;
        }
        .code {
            font-size: 7rem;
            font-weight: 200;
            letter-spacing: -0.04em;
            line-height: 1;
            color: var(--text);
            animation: fadeSlide 0.8s ease-out;
        }
        .divider {
            width: 48px;
            height: 1px;
            background: var(--border);
            margin: 2rem auto;
            animation: expand 0.6s ease-out 0.3s both;
        }
        .title {
            font-size: 1.125rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            animation: fadeSlide 0.6s ease-out 0.4s both;
        }
        .description {
            font-size: 0.9375rem;
            color: var(--muted);
            line-height: 1.6;
            animation: fadeSlide 0.6s ease-out 0.5s both;
        }
        .action {
            margin-top: 2.5rem;
            animation: fadeSlide 0.6s ease-out 0.6s both;
        }
        .action a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            transition: gap 0.2s, opacity 0.2s;
        }
        .action a:hover { 
            opacity: 0.7;
            gap: 0.75rem;
        }
        .action svg { width: 16px; height: 16px; }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes expand {
            from {
                width: 0;
                opacity: 0;
            }
            to {
                width: 48px;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="error">
        <div class="code">500</div>
        <div class="divider"></div>
        <h1 class="title">Erro interno do servidor</h1>
        <p class="description">Ocorreu um problema inesperado. Nossa equipe foi notificada.</p>
        <div class="action">
            <a href="/">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Voltar ao início
            </a>
        </div>
    </div>
</body>
</html>
